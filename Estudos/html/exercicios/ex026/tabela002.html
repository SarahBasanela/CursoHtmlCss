<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }   
        thead, tfoot{
            background-color: gray;
            color: white;
        } 
        </style>
</head>
<body>
    <h1>Uso de TAbelas Grandes</h1>
<!--
    ANATOMIA PARA TABELAS GRANDES
    TABLE
        THEAD
            TR, TD, TH
        TBODY
            TR, TD, TH
        TFOOTER
            TR, TD, TH
    -->
        <table>
            <thead>
                <th>Estado</th>
                <th>População</th>
            </thead>
            <tbody>
                <tr>
                    <td>São Paulo</td>
                    <td>45 345 211</td>
                </tr>
                <tr>
                    <td>Minas Gerais</td>
                    <td>12 876 099</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <th>Total de Habitantes</th>
                    <td>00000</td>
                </tr>
            </tfoot>
        </table>
</body>
</html>
