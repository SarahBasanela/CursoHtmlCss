<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<!--Estudar mais sobre RegEx-->
<body>
    <h1>Controles de Telefone e Email</h1>
    <form action="" method="get">
        <fieldset>
            <legend>Dados Pessoas</legend>
            <p>
                <label for="inome">Nome: </label>
                <input type="text" name="nome" id="inome" minlength="3" maxlength="30" required>
            </p>
            <p>
                <label for="itel">Telefone: </label>
                <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="^[0-9]{4}-[0-9]{4}">
            </p>
            <p>
                <label for="Email">Email: </label>
                <input type="email" name="email" id="Email">
            </p>
        </fieldset>
        <p>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </p>
    </form>
</body>
</html>
